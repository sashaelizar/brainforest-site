# Netlify Identity was deprecated by Netlify, so login at /admin runs through DecapBridge
# instead (a free service built for exactly this) — see CMS-SETUP.md.
backend:
  name: git-gateway
  repo: sashaelizar/brainforest-site
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/85cd80bb-63ed-4d30-930d-df808656e04c/pkce
  auth_token_endpoint: /sites/85cd80bb-63ed-4d30-930d-df808656e04c/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://brainforestbiosciences.netlify.app

local_backend: true

media_folder: "public/images/_cms-uploads"
public_folder: "/images/_cms-uploads"

collections:
  - name: "posts"
    label: "Articles"
    folder: "src/content/posts"
    create: true
    delete: false
    slug: "{{slug}}"
    identifier_field: title
    summary: "{{title}} — {{date}}"
    sortable_fields: ["date", "title"]
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - label: "Author"
        name: "author"
        widget: "select"
        options: ["Sasha Elizar, M.S.", "Alyssa Alfinito", "Medina Demiri"]
        default: "Sasha Elizar, M.S."
      - { label: "Published date", name: "date", widget: "datetime" }
      - { label: "Last updated", name: "updated", widget: "datetime", required: false }
      - { label: "Description (Google snippet + card text)", name: "description", widget: "text" }
      - { label: "Read time (e.g. '8 min read')", name: "readTime", widget: "string", required: false }
      - label: "Categories"
        name: "categories"
        widget: "select"
        multiple: true
        options:
          [
            "Neuroscience", "Gut Microbiome", "Functional Nutrition", "Mental Health",
            "Aging and Lifespan", "Hormones", "Immunity", "Detoxification", "Environment",
          ]
      - { label: "Hero image", name: "hero", widget: "image", required: false }
      - { label: "Hero image caption (optional)", name: "heroCaption", widget: "string", required: false }
      - { label: "Original Wix URL (leave as-is, do not edit)", name: "source_url", widget: "string", required: false }
      - label: "Article body"
        name: "body"
        widget: "text"
        hint: >
          This is raw HTML, not plain markdown — it's exactly how the article was exported from
          Wix. Edit the text directly (fix typos, swap a sentence, add a paragraph by copying the
          pattern of an existing one). Avoid using a rich-text/WYSIWYG editor here, since it could
          reformat the HTML and break the article's layout.
